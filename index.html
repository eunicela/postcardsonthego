<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a1612">
    <title>Postcard Moment</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Libre+Baskerville:ital@0;1&display=swap");

      :root {
        --ink: #2a2620;
        --muted: rgba(42, 38, 32, 0.48);
        --paper: #f3eadc;
        --paper-dark: #e1d5c3;
        --line: rgba(42, 38, 32, 0.32);
        --shadow: rgba(42, 38, 32, 0.16);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #e5e2dc;
      }

      .app {
        width: 100%;
        max-width: min(94vw, 760px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .flip-scene {
        width: 100%;
        perspective: 1400px;
        perspective-origin: 50% 45%;
      }

      .flip-scene[hidden] {
        display: none;
      }

      .flip-inner {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        transform-style: preserve-3d;
        transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .flip-inner.is-flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 4px;
      }

      .face--back {
        transform: rotateY(180deg);
      }

      .postcard {
        height: 100%;
        background: var(--paper);
        background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 42%);
        border: 1px solid var(--paper-dark);
        box-shadow: 0 18px 50px var(--shadow);
        padding: clamp(12px, 2.8vw, 22px);
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 2vw, 16px);
      }

      .viewport {
        flex: 1;
        min-height: 0;
        position: relative;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid rgba(42, 38, 32, 0.12);
        background: #d8d2c8;
      }

      .viewport video,
      .viewport img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .viewport img {
        display: none;
      }

      .viewport.has-photo img {
        display: block;
      }

      .viewport.has-photo video {
        display: none;
      }

      .error-banner {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem;
        text-align: center;
        background: rgba(243, 234, 220, 0.97);
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .error-banner.is-visible {
        display: flex;
      }

      .postcard__footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .postcard__footer--outside {
        margin-top: 14px;
        flex-direction: column;
      }

      .postcard__footer--outside[hidden] {
        display: none;
      }

      .camera-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .post-capture-controls {
        min-height: 2.05rem;
      }

      button {
        font-family: inherit;
        font-size: 0.82rem;
        letter-spacing: 0.02em;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        padding: 0.54rem 0.9rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      button:active:not(:disabled) {
        transform: scale(0.97);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--ink);
        color: var(--paper);
        box-shadow: 0 8px 24px rgba(42, 38, 32, 0.18);
      }

      .btn-primary:hover:not(:disabled) {
        background: #3a342d;
      }

      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .btn-ghost:hover:not(:disabled) {
        background: rgba(42, 38, 32, 0.06);
      }

      .btn-shutter {
        position: relative;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        padding: 0;
        border: 3px solid var(--paper);
        background: var(--ink);
        box-shadow: 0 0 0 2px var(--ink), 0 10px 28px rgba(42, 38, 32, 0.18);
      }

      .btn-shutter:hover:not(:disabled) {
        background: #3a342d;
      }

      .btn-shutter span {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .back-body {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(120px, 0.82fr);
        gap: clamp(18px, 4vw, 42px);
      }

      .message-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
        width: 100%;
      }

      .memory-input {
        flex: 1;
        min-height: 0;
        width: 100%;
        resize: none;
        border: none;
        background: transparent;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(1rem, 3.4vw, 1.5rem);
        font-style: italic;
        line-height: 1.6;
        color: var(--ink);
        padding: 0;
      }

      .memory-input:focus {
        outline: none;
      }

      .memory-input::placeholder {
        color: rgba(42, 38, 32, 0.35);
        font-style: italic;
      }

      .location-panel {
        border-left: 1px solid var(--line);
        padding-left: clamp(18px, 4vw, 40px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(14px, 3vw, 24px);
      }

      .location-label {
        margin: 0;
        font-size: 0.62rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .location-lines {
        display: grid;
        gap: clamp(12px, 2.5vw, 20px);
      }

      .location-line {
        min-height: 1.3rem;
        border-bottom: 1px solid var(--line);
      }

      .location-value {
        margin: 0;
        padding-bottom: 0.35rem;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(0.72rem, 2.1vw, 0.92rem);
        font-style: italic;
        line-height: 1.35;
        color: var(--ink);
      }

      .location-value.is-empty {
        color: rgba(42, 38, 32, 0.38);
      }

      .finished-view {
        width: min(100%, 72dvh);
        display: grid;
        gap: clamp(12px, 2.4vw, 18px);
      }

      .finished-view[hidden] {
        display: none;
      }

      .finished-card {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--paper);
        border: 1px solid var(--paper-dark);
        box-shadow: 0 18px 50px var(--shadow);
        padding: clamp(12px, 2.8vw, 22px);
      }

      .finished-photo-frame {
        width: 100%;
        height: 100%;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid rgba(42, 38, 32, 0.12);
        background: #d8d2c8;
      }

      .finished-photo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .finished-card--message {
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 2vw, 16px);
      }

      .finished-message {
        flex: 1;
        margin: 0;
        white-space: pre-wrap;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(1rem, 3.4vw, 1.5rem);
        font-style: italic;
        line-height: 1.6;
        color: var(--ink);
      }

      .finished-message.is-empty {
        color: rgba(42, 38, 32, 0.35);
      }

      .finished-actions {
        display: flex;
        justify-content: center;
        margin-top: 14px;
      }

      @media (max-width: 560px) {
        .app {
          max-width: min(94vw, 520px);
        }

        .back-body {
          grid-template-columns: minmax(0, 1fr) minmax(110px, 0.78fr);
          gap: 14px;
        }

        .location-panel {
          padding-left: 14px;
          gap: 12px;
        }

      }

      @media (prefers-reduced-motion: reduce) {
        .flip-inner {
          transition: none;
        }

        .flip-inner.is-flipped {
          transform: rotateY(180deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="flip-scene" id="flipScene" aria-live="polite">
        <div class="flip-inner" id="flipInner">
          <div class="face face--front">
            <div class="postcard">
              <div class="viewport" id="viewport">
                <video id="video" playsinline autoplay muted></video>
                <img id="photoPreview" alt="Captured moment">
                <div class="error-banner" id="errorBanner" role="alert">
                  <span id="errorText"></span>
                  <button type="button" class="btn-primary" id="retryCamera">Try again</button>
                </div>
              </div>
            </div>
          </div>

          <div class="face face--back">
            <div class="postcard">
              <div class="back-body">
                <div class="message-panel">
                  <textarea
                    id="memory"
                    class="memory-input"
                    placeholder="I saw this view..."
                    rows="5"
                    autocomplete="off"
                  ></textarea>
                </div>
                <div class="location-panel" aria-label="Photo location">
                  <p class="location-label">Location</p>
                  <div class="location-lines">
                    <p class="location-line location-value is-empty" id="locationPreview">Waiting for location</p>
                    <span class="location-line"></span>
                    <span class="location-line"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="postcard__footer postcard__footer--outside" id="frontActions">
          <div class="camera-controls">
            <button type="button" class="btn-shutter" id="shutter" aria-label="Take photo">
              <span>Take photo</span>
            </button>
          </div>
          <div class="camera-controls post-capture-controls">
            <button type="button" class="btn-ghost" id="retryPhoto" hidden aria-label="Retake photo">
              Retry
            </button>
            <button type="button" class="btn-ghost" id="flipFront" hidden disabled aria-label="Write message">
              Write message
            </button>
          </div>
        </div>
        <div class="postcard__footer postcard__footer--outside" id="backActions" hidden>
          <div class="camera-controls">
            <button type="button" class="btn-ghost" id="flipBack" aria-label="Return to photo side">
              Flip
            </button>
            <button type="button" class="btn-primary" id="doneCard">Done</button>
          </div>
        </div>
      </div>

      <div class="finished-view" id="finishedView" hidden aria-live="polite">
        <div class="finished-card">
          <div class="finished-photo-frame">
            <img id="finishedPhoto" alt="Finished postcard photo">
          </div>
        </div>
        <div class="finished-card finished-card--message">
          <div class="back-body">
            <div class="message-panel">
              <p class="finished-message" id="finishedMessage"></p>
            </div>
            <div class="location-panel" aria-label="Finished photo location">
              <p class="location-label">Location</p>
              <div class="location-lines">
                <p class="location-line location-value is-empty" id="finishedLocation"></p>
                <span class="location-line"></span>
                <span class="location-line"></span>
              </div>
            </div>
          </div>
          <div class="finished-actions">
            <button type="button" class="btn-primary" id="newCard">New postcard</button>
          </div>
        </div>
      </div>
    </div>

    <canvas id="captureCanvas" hidden></canvas>

    <script>
      (function () {
        const video = document.getElementById("video");
        const viewport = document.getElementById("viewport");
        const photoPreview = document.getElementById("photoPreview");
        const shutter = document.getElementById("shutter");
        const retryPhoto = document.getElementById("retryPhoto");
        const flipScene = document.getElementById("flipScene");
        const frontActions = document.getElementById("frontActions");
        const backActions = document.getElementById("backActions");
        const flipInner = document.getElementById("flipInner");
        const flipFront = document.getElementById("flipFront");
        const flipBack = document.getElementById("flipBack");
        const doneCard = document.getElementById("doneCard");
        const finishedView = document.getElementById("finishedView");
        const finishedPhoto = document.getElementById("finishedPhoto");
        const finishedMessage = document.getElementById("finishedMessage");
        const locationPreview = document.getElementById("locationPreview");
        const finishedLocation = document.getElementById("finishedLocation");
        const newCard = document.getElementById("newCard");
        const memory = document.getElementById("memory");
        const errorBanner = document.getElementById("errorBanner");
        const errorText = document.getElementById("errorText");
        const retryCamera = document.getElementById("retryCamera");
        const canvas = document.getElementById("captureCanvas");
        const ctx = canvas.getContext("2d");

        let stream = null;
        let capturedDataUrl = "";
        let locationText = "";

        function showError(message) {
          errorText.textContent = message;
          errorBanner.classList.add("is-visible");
        }

        function clearError() {
          errorBanner.classList.remove("is-visible");
          errorText.textContent = "";
        }

        async function stopStream() {
          if (stream) {
            stream.getTracks().forEach((t) => t.stop());
            stream = null;
          }
        }

        async function startCamera() {
          clearError();
          await stopStream();
          shutter.disabled = true;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
              audio: false,
            });
            video.srcObject = stream;
            await video.play();
            shutter.disabled = false;
          } catch (err) {
            showError(
              "Camera access is needed for your postcard. Allow the camera in your browser settings, or try a secure (https) connection."
            );
            console.error(err);
          }
        }

        function setFlipped(on) {
          flipInner.classList.toggle("is-flipped", on);
          frontActions.hidden = on;
          backActions.hidden = !on;
          flipFront.disabled = !capturedDataUrl;
          flipFront.hidden = !capturedDataUrl;
          retryPhoto.hidden = !capturedDataUrl;
        }

        function clearPhoto() {
          viewport.classList.remove("has-photo");
          capturedDataUrl = "";
          locationText = "";
          photoPreview.removeAttribute("src");
          finishedPhoto.removeAttribute("src");
          setLocationText(locationPreview, "Waiting for location", true);
          setLocationText(finishedLocation, "", true);
          flipFront.disabled = true;
          flipFront.hidden = true;
          retryPhoto.hidden = true;
        }

        function setLocationText(element, text, isEmpty) {
          element.textContent = text;
          element.classList.toggle("is-empty", isEmpty);
        }

        function formatLocation(coords) {
          return `${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
        }

        function captureLocation() {
          if (!navigator.geolocation) {
            locationText = "Location unavailable";
            setLocationText(locationPreview, locationText, true);
            return;
          }

          setLocationText(locationPreview, "Finding location...", true);
          navigator.geolocation.getCurrentPosition(
            (position) => {
              locationText = formatLocation(position.coords);
              setLocationText(locationPreview, locationText, false);
            },
            () => {
              locationText = "Location unavailable";
              setLocationText(locationPreview, locationText, true);
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
          );
        }

        function showFinishedPostcard() {
          if (!capturedDataUrl) return;
          const message = memory.value.trim();
          finishedPhoto.src = capturedDataUrl;
          finishedMessage.textContent = message || "I saw this view...";
          finishedMessage.classList.toggle("is-empty", !message);
          setLocationText(finishedLocation, locationText || "Location unavailable", !locationText);
          flipScene.hidden = true;
          finishedView.hidden = false;
          stopStream();
        }

        function showComposer() {
          finishedView.hidden = true;
          flipScene.hidden = false;
          frontActions.hidden = false;
          backActions.hidden = true;
        }

        shutter.addEventListener("click", () => {
          if (!stream || video.readyState < 2) return;
          const w = video.videoWidth;
          const h = video.videoHeight;
          if (!w || !h) return;
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          capturedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
          photoPreview.src = capturedDataUrl;
          viewport.classList.add("has-photo");
          flipFront.disabled = false;
          flipFront.hidden = false;
          retryPhoto.hidden = false;
          captureLocation();
        });

        flipFront.addEventListener("click", () => {
          if (capturedDataUrl) {
            setFlipped(true);
            memory.focus();
          }
        });

        flipBack.addEventListener("click", () => {
          setFlipped(false);
        });

        retryPhoto.addEventListener("click", () => {
          clearPhoto();
          setFlipped(false);
        });

        doneCard.addEventListener("click", () => {
          showFinishedPostcard();
        });

        newCard.addEventListener("click", async () => {
          memory.value = "";
          showComposer();
          clearPhoto();
          setFlipped(false);
          await startCamera();
        });

        retryCamera.addEventListener("click", () => {
          startCamera();
        });

        startCamera();
      })();
    </script>
  </body>
</html>
