<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a1612">
    <title>Postcard Moment</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Libre+Baskerville:ital@0;1&display=swap");

      :root {
        --ink: #2a2620;
        --muted: rgba(42, 38, 32, 0.48);
        --paper: #f3eadc;
        --paper-dark: #e1d5c3;
        --line: rgba(42, 38, 32, 0.32);
        --shadow: rgba(42, 38, 32, 0.16);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #e5e2dc;
      }

      .app {
        width: 100%;
        max-width: min(94vw, 760px);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .flip-scene {
        width: 100%;
        perspective: 1400px;
        perspective-origin: 50% 45%;
      }

      .flip-inner {
        position: relative;
        width: 100%;
        aspect-ratio: 1.55 / 1;
        transform-style: preserve-3d;
        transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .flip-inner.is-flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 4px;
      }

      .face--back {
        transform: rotateY(180deg);
      }

      .postcard {
        height: 100%;
        background: var(--paper);
        background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 42%);
        border: 1px solid var(--paper-dark);
        box-shadow: 0 18px 50px var(--shadow);
        padding: clamp(12px, 2.8vw, 22px);
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 2vw, 16px);
      }

      .viewport {
        flex: 1;
        min-height: 0;
        position: relative;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid rgba(42, 38, 32, 0.12);
        background: #d8d2c8;
      }

      .viewport video,
      .viewport img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .viewport img {
        display: none;
      }

      .viewport.has-photo img {
        display: block;
      }

      .viewport.has-photo video {
        display: none;
      }

      .error-banner {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem;
        text-align: center;
        background: rgba(243, 234, 220, 0.97);
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .error-banner.is-visible {
        display: flex;
      }

      .postcard__footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .postcard__footer--front {
        flex-direction: column;
      }

      .camera-controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        font-family: inherit;
        font-size: 0.82rem;
        letter-spacing: 0.02em;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        padding: 0.54rem 0.9rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      button:active:not(:disabled) {
        transform: scale(0.97);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--ink);
        color: var(--paper);
        box-shadow: 0 8px 24px rgba(42, 38, 32, 0.18);
      }

      .btn-primary:hover:not(:disabled) {
        background: #3a342d;
      }

      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .btn-ghost:hover:not(:disabled) {
        background: rgba(42, 38, 32, 0.06);
      }

      .btn-shutter {
        position: relative;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        padding: 0;
        border: 3px solid var(--paper);
        background: var(--ink);
        box-shadow: 0 0 0 2px var(--ink), 0 10px 28px rgba(42, 38, 32, 0.18);
      }

      .btn-shutter:hover:not(:disabled) {
        background: #3a342d;
      }

      .btn-shutter span {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .back-body {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(140px, 0.8fr);
        gap: clamp(18px, 4vw, 42px);
      }

      .message-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .postcard-title {
        margin: 0;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(1.35rem, 4.2vw, 2rem);
        font-weight: 400;
      }

      .back-label {
        font-size: 0.62rem;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .memory-input {
        flex: 1;
        min-height: 0;
        width: 100%;
        resize: none;
        border: none;
        background: transparent;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(1rem, 3.4vw, 1.5rem);
        font-style: italic;
        line-height: 1.6;
        color: var(--ink);
        padding: 4px 2px 0;
        background-image: repeating-linear-gradient(
          transparent,
          transparent calc(1.6em - 1px),
          rgba(42, 38, 32, 0.12) calc(1.6em - 1px),
          rgba(42, 38, 32, 0.12) 1.6em
        );
      }

      .memory-input:focus {
        outline: none;
      }

      .memory-input::placeholder {
        color: rgba(42, 38, 32, 0.35);
        font-style: italic;
      }

      .address-panel {
        border-left: 1px solid var(--line);
        padding-left: clamp(18px, 4vw, 40px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(16px, 3vw, 26px);
      }

      .address-line {
        border-bottom: 1px solid var(--line);
        height: 1px;
        width: 100%;
      }

      .date-mark {
        align-self: flex-end;
        margin: 0;
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(0.72rem, 2.2vw, 0.9rem);
        font-style: italic;
        color: var(--muted);
      }

      @media (max-width: 560px) {
        .app {
          max-width: min(94vw, 520px);
        }

        .flip-inner {
          aspect-ratio: 1.3 / 1;
        }

        .back-body {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .address-panel {
          border-left: 0;
          border-top: 1px solid var(--line);
          padding: 14px 0 0;
          gap: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .flip-inner {
          transition: none;
        }

        .flip-inner.is-flipped {
          transform: rotateY(180deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="flip-scene" aria-live="polite">
        <div class="flip-inner" id="flipInner">
          <div class="face face--front">
            <div class="postcard">
              <div class="viewport" id="viewport">
                <video id="video" playsinline autoplay muted></video>
                <img id="photoPreview" alt="Captured moment">
                <div class="error-banner" id="errorBanner" role="alert">
                  <span id="errorText"></span>
                  <button type="button" class="btn-primary" id="retryCamera">Try again</button>
                </div>
              </div>
              <div class="postcard__footer postcard__footer--front">
                <div class="camera-controls">
                  <button type="button" class="btn-shutter" id="shutter" aria-label="Take photo">
                    <span>Take photo</span>
                  </button>
                  <button type="button" class="btn-ghost" id="switchCamera" hidden aria-label="Switch camera">
                    Flip cam
                  </button>
                </div>
                <div class="camera-controls">
                  <button type="button" class="btn-ghost" id="retryPhoto" hidden aria-label="Retake photo">
                    Retry
                  </button>
                  <button type="button" class="btn-ghost" id="flipFront" hidden disabled aria-label="Write message">
                    Write message
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="face face--back">
            <div class="postcard">
              <div class="back-body">
                <div class="message-panel">
                  <h1 class="postcard-title">Post Card</h1>
                  <label class="back-label" for="memory">This space for writing messages</label>
                  <textarea
                    id="memory"
                    class="memory-input"
                    placeholder="I saw this view..."
                    rows="5"
                    autocomplete="off"
                  ></textarea>
                </div>
                <div class="address-panel" aria-hidden="true">
                  <span class="address-line"></span>
                  <span class="address-line"></span>
                  <span class="address-line"></span>
                  <p class="date-mark">moment no. 25</p>
                </div>
              </div>
              <div class="postcard__footer">
                <button type="button" class="btn-ghost" id="flipBack" aria-label="Return to photo side">
                  Photo side
                </button>
                <button type="button" class="btn-primary" id="newCard">New postcard</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <canvas id="captureCanvas" hidden></canvas>

    <script>
      (function () {
        const video = document.getElementById("video");
        const viewport = document.getElementById("viewport");
        const photoPreview = document.getElementById("photoPreview");
        const shutter = document.getElementById("shutter");
        const retryPhoto = document.getElementById("retryPhoto");
        const flipInner = document.getElementById("flipInner");
        const flipFront = document.getElementById("flipFront");
        const flipBack = document.getElementById("flipBack");
        const newCard = document.getElementById("newCard");
        const memory = document.getElementById("memory");
        const errorBanner = document.getElementById("errorBanner");
        const errorText = document.getElementById("errorText");
        const retryCamera = document.getElementById("retryCamera");
        const switchCameraBtn = document.getElementById("switchCamera");
        const canvas = document.getElementById("captureCanvas");
        const ctx = canvas.getContext("2d");

        let stream = null;
        let facingMode = "environment";
        let capturedDataUrl = "";

        function showError(message) {
          errorText.textContent = message;
          errorBanner.classList.add("is-visible");
        }

        function clearError() {
          errorBanner.classList.remove("is-visible");
          errorText.textContent = "";
        }

        async function stopStream() {
          if (stream) {
            stream.getTracks().forEach((t) => t.stop());
            stream = null;
          }
        }

        async function startCamera() {
          clearError();
          await stopStream();
          shutter.disabled = true;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false,
            });
            video.srcObject = stream;
            await video.play();
            shutter.disabled = false;
            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
              const devices = await navigator.mediaDevices.enumerateDevices();
              const videos = devices.filter((d) => d.kind === "videoinput");
              switchCameraBtn.hidden = videos.length < 2;
            }
          } catch (err) {
            showError(
              "Camera access is needed for your postcard. Allow the camera in your browser settings, or try a secure (https) connection."
            );
            console.error(err);
          }
        }

        function setFlipped(on) {
          flipInner.classList.toggle("is-flipped", on);
          flipFront.disabled = !capturedDataUrl;
          flipFront.hidden = !capturedDataUrl;
          retryPhoto.hidden = !capturedDataUrl;
        }

        function clearPhoto() {
          viewport.classList.remove("has-photo");
          capturedDataUrl = "";
          photoPreview.removeAttribute("src");
          flipFront.disabled = true;
          flipFront.hidden = true;
          retryPhoto.hidden = true;
        }

        shutter.addEventListener("click", () => {
          if (!stream || video.readyState < 2) return;
          const w = video.videoWidth;
          const h = video.videoHeight;
          if (!w || !h) return;
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          capturedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
          photoPreview.src = capturedDataUrl;
          viewport.classList.add("has-photo");
          flipFront.disabled = false;
          flipFront.hidden = false;
          retryPhoto.hidden = false;
        });

        flipFront.addEventListener("click", () => {
          if (capturedDataUrl) {
            setFlipped(true);
            memory.focus();
          }
        });

        flipBack.addEventListener("click", () => {
          setFlipped(false);
        });

        switchCameraBtn.addEventListener("click", async () => {
          facingMode = facingMode === "environment" ? "user" : "environment";
          clearPhoto();
          setFlipped(false);
          await startCamera();
        });

        retryPhoto.addEventListener("click", () => {
          clearPhoto();
          setFlipped(false);
        });

        newCard.addEventListener("click", async () => {
          memory.value = "";
          clearPhoto();
          setFlipped(false);
          await startCamera();
        });

        retryCamera.addEventListener("click", () => {
          startCamera();
        });

        startCamera();
      })();
    </script>
  </body>
</html>
