<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a1612">
    <title>Postcard Moment</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap");

      :root {
        --ink: #1a1612;
        --paper: #f4efe6;
        --paper-dark: #e8dfd0;
        --accent: #8b4513;
        --stamp: #c94c4c;
        --shadow: rgba(26, 22, 18, 0.35);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
        font-family: "Crimson Pro", Georgia, serif;
        color: var(--ink);
        background: radial-gradient(ellipse 120% 80% at 50% 20%, #3d3830 0%, #1a1612 55%, #0d0b09 100%);
      }

      .app {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }

      h1 {
        margin: 0;
        font-family: "IM Fell English", "Crimson Pro", serif;
        font-weight: 400;
        font-size: clamp(1.35rem, 4vw, 1.65rem);
        letter-spacing: 0.04em;
        color: var(--paper);
        text-align: center;
        text-shadow: 0 2px 12px var(--shadow);
      }

      .hint {
        margin: -0.5rem 0 0;
        font-size: 0.9rem;
        color: rgba(244, 239, 230, 0.65);
        text-align: center;
        max-width: 32ch;
        line-height: 1.45;
      }

      .flip-scene {
        width: 100%;
        perspective: 1400px;
        perspective-origin: 50% 45%;
      }

      .flip-inner {
        position: relative;
        width: 100%;
        aspect-ratio: 3 / 4;
        transform-style: preserve-3d;
        transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .flip-inner.is-flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 4px;
      }

      .face--back {
        transform: rotateY(180deg);
      }

      /* Postcard shell (front + back share visual language) */
      .postcard {
        height: 100%;
        background: var(--paper);
        background-image: linear-gradient(
            105deg,
            rgba(255, 255, 255, 0.35) 0%,
            transparent 45%
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(26, 22, 18, 0.03) 2px,
            rgba(26, 22, 18, 0.03) 3px
          );
        border: 3px solid var(--paper-dark);
        outline: 1px solid rgba(26, 22, 18, 0.12);
        outline-offset: -5px;
        box-shadow: 0 24px 48px var(--shadow), 0 4px 12px rgba(0, 0, 0, 0.25);
        padding: clamp(10px, 3vw, 14px);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .postcard__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        flex-shrink: 0;
      }

      .postcard__mark {
        font-family: "IM Fell English", serif;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
        padding-top: 2px;
      }

      .postcard__stamp {
        width: 44px;
        height: 52px;
        border: 2px dashed rgba(201, 76, 76, 0.55);
        border-radius: 2px;
        display: grid;
        place-items: center;
        font-size: 0.65rem;
        color: var(--stamp);
        font-variant: small-caps;
        letter-spacing: 0.06em;
        flex-shrink: 0;
      }

      .viewport {
        flex: 1;
        min-height: 0;
        position: relative;
        border-radius: 2px;
        overflow: hidden;
        border: 2px solid rgba(26, 22, 18, 0.15);
        background: #111;
      }

      .viewport video,
      .viewport img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .viewport img {
        display: none;
      }

      .viewport.has-photo img {
        display: block;
      }

      .viewport.has-photo video {
        display: none;
      }

      .error-banner {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem;
        text-align: center;
        background: rgba(244, 239, 230, 0.97);
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .error-banner.is-visible {
        display: flex;
      }

      .postcard__footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      button {
        font-family: "Crimson Pro", Georgia, serif;
        font-size: 1rem;
        cursor: pointer;
        border: none;
        border-radius: 3px;
        padding: 0.55rem 1.15rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }

      button:active:not(:disabled) {
        transform: scale(0.97);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--ink);
        color: var(--paper);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }

      .btn-primary:hover:not(:disabled) {
        background: #2a241f;
      }

      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid rgba(26, 22, 18, 0.35);
      }

      .btn-ghost:hover:not(:disabled) {
        background: rgba(26, 22, 18, 0.06);
      }

      .btn-shutter {
        position: relative;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        padding: 0;
        border: 3px solid var(--paper);
        background: var(--ink);
        box-shadow: 0 0 0 3px var(--ink), 0 6px 20px var(--shadow);
      }

      .btn-shutter:hover:not(:disabled) {
        background: #2a241f;
      }

      .btn-shutter span {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* Back face */
      .back-body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .back-label {
        font-family: "IM Fell English", serif;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .memory-input {
        flex: 1;
        min-height: 120px;
        width: 100%;
        resize: none;
        border: none;
        background: transparent;
        font-family: "Crimson Pro", Georgia, serif;
        font-size: 1.15rem;
        line-height: 1.55;
        color: var(--ink);
        padding: 4px 2px;
        background-image: repeating-linear-gradient(
          transparent,
          transparent calc(1.55em - 1px),
          rgba(26, 22, 18, 0.12) calc(1.55em - 1px),
          rgba(26, 22, 18, 0.12) 1.55em
        );
      }

      .memory-input:focus {
        outline: none;
      }

      .memory-input::placeholder {
        color: rgba(26, 22, 18, 0.38);
        font-style: italic;
      }

      .thumb-strip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        border-top: 1px solid rgba(26, 22, 18, 0.12);
      }

      .thumb-strip img {
        width: 56px;
        height: 56px;
        object-fit: cover;
        border-radius: 2px;
        border: 1px solid rgba(26, 22, 18, 0.2);
        flex-shrink: 0;
      }

      .thumb-strip p {
        margin: 0;
        font-size: 0.8rem;
        line-height: 1.35;
        color: rgba(26, 22, 18, 0.55);
      }

      @media (prefers-reduced-motion: reduce) {
        .flip-inner {
          transition: none;
        }

        .flip-inner.is-flipped {
          transform: rotateY(180deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Postcard from a moment</h1>
      <p class="hint">Frame your moment, capture it, then turn the card and write what you will remember.</p>

      <div class="flip-scene" aria-live="polite">
        <div class="flip-inner" id="flipInner">
          <!-- Front: camera in postcard -->
          <div class="face face--front">
            <div class="postcard">
              <div class="postcard__header">
                <span class="postcard__mark">Air mail · moment</span>
                <div class="postcard__stamp" aria-hidden="true">stamp</div>
              </div>
              <div class="viewport" id="viewport">
                <video id="video" playsinline autoplay muted></video>
                <img id="photoPreview" alt="Captured moment">
                <div class="error-banner" id="errorBanner" role="alert">
                  <span id="errorText"></span>
                  <button type="button" class="btn-primary" id="retryCamera">Try again</button>
                </div>
              </div>
              <div class="postcard__footer">
                <button type="button" class="btn-ghost" id="flipFront" disabled aria-label="View message side">
                  Message side
                </button>
                <button type="button" class="btn-shutter" id="shutter" aria-label="Take photo">
                  <span>Take photo</span>
                </button>
                <button type="button" class="btn-ghost" id="switchCamera" hidden aria-label="Switch camera">
                  Flip cam
                </button>
              </div>
            </div>
          </div>

          <!-- Back: memory -->
          <div class="face face--back">
            <div class="postcard">
              <div class="postcard__header">
                <span class="postcard__mark">The memory</span>
                <div class="postcard__stamp" aria-hidden="true">sent</div>
              </div>
              <div class="back-body">
                <label class="back-label" for="memory">Write it down</label>
                <textarea
                  id="memory"
                  class="memory-input"
                  placeholder="What will you remember about this moment?"
                  rows="6"
                  autocomplete="off"
                ></textarea>
              </div>
              <div class="thumb-strip">
                <img id="thumbBack" alt="">
                <p>This side is yours. The photo stays on the front whenever you turn back.</p>
              </div>
              <div class="postcard__footer">
                <button type="button" class="btn-ghost" id="flipBack" aria-label="Return to photo side">
                  Photo side
                </button>
                <button type="button" class="btn-primary" id="newCard">New postcard</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <canvas id="captureCanvas" hidden></canvas>

    <script>
      (function () {
        const video = document.getElementById("video");
        const viewport = document.getElementById("viewport");
        const photoPreview = document.getElementById("photoPreview");
        const thumbBack = document.getElementById("thumbBack");
        const shutter = document.getElementById("shutter");
        const flipInner = document.getElementById("flipInner");
        const flipFront = document.getElementById("flipFront");
        const flipBack = document.getElementById("flipBack");
        const newCard = document.getElementById("newCard");
        const memory = document.getElementById("memory");
        const errorBanner = document.getElementById("errorBanner");
        const errorText = document.getElementById("errorText");
        const retryCamera = document.getElementById("retryCamera");
        const switchCameraBtn = document.getElementById("switchCamera");
        const canvas = document.getElementById("captureCanvas");
        const ctx = canvas.getContext("2d");

        let stream = null;
        let facingMode = "environment";
        let capturedDataUrl = "";

        function showError(message) {
          errorText.textContent = message;
          errorBanner.classList.add("is-visible");
        }

        function clearError() {
          errorBanner.classList.remove("is-visible");
          errorText.textContent = "";
        }

        async function stopStream() {
          if (stream) {
            stream.getTracks().forEach((t) => t.stop());
            stream = null;
          }
        }

        async function startCamera() {
          clearError();
          await stopStream();
          shutter.disabled = true;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false,
            });
            video.srcObject = stream;
            await video.play();
            shutter.disabled = false;
            if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
              const devices = await navigator.mediaDevices.enumerateDevices();
              const videos = devices.filter((d) => d.kind === "videoinput");
              switchCameraBtn.hidden = videos.length < 2;
            }
          } catch (err) {
            showError(
              "Camera access is needed for your postcard. Allow the camera in your browser settings, or try a secure (https) connection."
            );
            console.error(err);
          }
        }

        function setFlipped(on) {
          flipInner.classList.toggle("is-flipped", on);
          flipFront.disabled = !capturedDataUrl;
        }

        shutter.addEventListener("click", () => {
          if (!stream || video.readyState < 2) return;
          const w = video.videoWidth;
          const h = video.videoHeight;
          if (!w || !h) return;
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          capturedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
          photoPreview.src = capturedDataUrl;
          thumbBack.src = capturedDataUrl;
          viewport.classList.add("has-photo");
          flipFront.disabled = false;
          setFlipped(true);
          memory.focus();
        });

        flipFront.addEventListener("click", () => {
          if (capturedDataUrl) setFlipped(true);
        });

        flipBack.addEventListener("click", () => {
          setFlipped(false);
        });

        switchCameraBtn.addEventListener("click", async () => {
          facingMode = facingMode === "environment" ? "user" : "environment";
          viewport.classList.remove("has-photo");
          capturedDataUrl = "";
          photoPreview.removeAttribute("src");
          thumbBack.removeAttribute("src");
          flipFront.disabled = true;
          setFlipped(false);
          await startCamera();
        });

        newCard.addEventListener("click", async () => {
          memory.value = "";
          viewport.classList.remove("has-photo");
          capturedDataUrl = "";
          photoPreview.removeAttribute("src");
          thumbBack.removeAttribute("src");
          flipFront.disabled = true;
          setFlipped(false);
          await startCamera();
        });

        retryCamera.addEventListener("click", () => {
          startCamera();
        });

        startCamera();
      })();
    </script>
  </body>
</html>
